<!DOCTYPE html>
<html>
<head>
    <title>Logo Test</title>
</head>
<body>
    <h1>Logo Loading Test</h1>
    <p>Check console for load events</p>

    <script>
        const logos = [
            '/Logos/anthill.png',
            '/Logos/ei-logo.png',
            '/Logos/slazzer-preview-kr0d8.png'
        ];

        logos.forEach(src => {
            const img = new Image();
            img.onload = () => console.log(`✓ Loaded: ${src}`);
            img.onerror = (err) => console.error(`✗ Failed: ${src}`, err);
            img.src = src;
        });
    </script>
</body>
</html>
